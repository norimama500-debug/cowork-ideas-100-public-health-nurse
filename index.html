<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>保健師のためのClaude活用アイデア100選</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --teal:    #0d9488;
      --teal-l:  #ccfbf1;
      --sky:     #0284c7;
      --sky-l:   #e0f2fe;
      --green:   #16a34a;
      --green-l: #dcfce7;
      --violet:  #7c3aed;
      --violet-l:#ede9fe;
      --amber:   #d97706;
      --amber-l: #fef3c7;
      --rose:    #e11d48;
      --rose-l:  #ffe4e6;
      --indigo:  #4338ca;
      --indigo-l:#e0e7ff;
      --cyan:    #0891b2;
      --cyan-l:  #cffafe;
      --bg:      #f0fdfa;
      --card-bg: #ffffff;
      --text:    #134e4a;
      --sub:     #5eaaa0;
      --border:  #b2d8d4;
      --shadow:  rgba(13,148,136,.12);
    }
    html { scroll-behavior: smooth; }
    body {
      font-family: 'Hiragino Kaku Gothic ProN', 'Hiragino Sans', 'Noto Sans JP', sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.6;
    }

    /* ===== HERO ===== */
    .hero {
      background: linear-gradient(135deg, #ccfbf1 0%, #e0f2fe 50%, #ede9fe 100%);
      padding: 64px 24px 56px;
      text-align: center;
      position: relative;
      overflow: hidden;
    }
    .hero::before {
      content: "";
      position: absolute; inset: 0;
      background:
        radial-gradient(circle at 15% 30%, rgba(13,148,136,.15) 0%, transparent 55%),
        radial-gradient(circle at 85% 70%, rgba(2,132,199,.12) 0%, transparent 55%),
        radial-gradient(circle at 50% 90%, rgba(124,58,237,.10) 0%, transparent 45%);
      pointer-events: none;
    }
    .hero-badge {
      display: inline-block;
      background: linear-gradient(90deg, #0d9488, #0284c7);
      color: #fff;
      font-size: .72rem;
      font-weight: 700;
      letter-spacing: .1em;
      padding: 4px 14px;
      border-radius: 999px;
      margin-bottom: 18px;
    }
    .hero h1 {
      font-size: clamp(1.8rem, 5vw, 3rem);
      font-weight: 900;
      line-height: 1.25;
      background: linear-gradient(135deg, #0d9488, #0284c7);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 16px;
    }
    .hero-sub {
      font-size: 1rem;
      color: #5eaaa0;
      max-width: 580px;
      margin: 0 auto 32px;
    }
    .hero-count {
      display: flex;
      justify-content: center;
      gap: 32px;
      flex-wrap: wrap;
    }
    .hero-count-item { text-align: center; }
    .hero-count-num {
      font-size: 2.2rem;
      font-weight: 900;
      background: linear-gradient(135deg, #0d9488, #0284c7);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      line-height: 1;
    }
    .hero-count-label { font-size: .75rem; color: #5eaaa0; margin-top: 2px; }
    .emoji-deco { font-size: 2rem; margin-bottom: 10px; display: block; }

    /* ===== CONTROLS ===== */
    .controls {
      max-width: 1200px;
      margin: 32px auto 0;
      padding: 0 20px;
    }
    .search-wrap {
      position: relative;
      max-width: 480px;
      margin: 0 auto 24px;
    }
    .search-wrap svg {
      position: absolute; left: 14px; top: 50%;
      transform: translateY(-50%);
      width: 18px; height: 18px;
      color: #5eaaa0; pointer-events: none;
    }
    .search-input {
      width: 100%;
      padding: 12px 16px 12px 42px;
      border: 2px solid var(--border);
      border-radius: 999px;
      background: #fff;
      font-size: .95rem;
      color: var(--text);
      outline: none;
      transition: border-color .2s, box-shadow .2s;
    }
    .search-input::placeholder { color: #5eaaa0; }
    .search-input:focus {
      border-color: #0d9488;
      box-shadow: 0 0 0 3px rgba(13,148,136,.15);
    }
    .filter-wrap {
      display: flex; flex-wrap: wrap; gap: 8px;
      justify-content: center; margin-bottom: 16px;
    }
    .filter-btn {
      padding: 6px 16px;
      border: 2px solid var(--border);
      border-radius: 999px;
      background: #fff;
      font-size: .82rem; font-weight: 600;
      color: var(--sub); cursor: pointer;
      transition: all .18s;
    }
    .filter-btn:hover { border-color: #0d9488; color: #0d9488; }
    .filter-btn.active {
      background: linear-gradient(135deg, #0d9488, #0284c7);
      border-color: transparent; color: #fff;
      box-shadow: 0 2px 10px rgba(13,148,136,.35);
    }
    .result-count {
      text-align: center; font-size: .82rem;
      color: #5eaaa0; margin-bottom: 24px;
    }

    /* ===== GRID ===== */
    .grid {
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 20px 64px;
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 16px;
    }

    /* ===== CARD ===== */
    .card {
      background: var(--card-bg);
      border-radius: 16px;
      border: 1.5px solid var(--border);
      padding: 20px 18px 16px;
      display: flex; flex-direction: column; gap: 10px;
      cursor: pointer;
      transition: transform .18s, box-shadow .18s, border-color .18s;
      position: relative; overflow: hidden;
    }
    .card::before {
      content: "";
      position: absolute; top: 0; left: 0; right: 0;
      height: 3px; border-radius: 16px 16px 0 0;
    }
    .card:hover {
      transform: translateY(-3px);
      box-shadow: 0 8px 28px var(--shadow);
      border-color: #99d6d1;
    }
    .card.copied { animation: pulse .4s ease; }
    @keyframes pulse {
      0%   { transform: scale(1); }
      50%  { transform: scale(1.03); }
      100% { transform: scale(1); }
    }
    .card-header {
      display: flex; align-items: flex-start; gap: 10px;
    }
    .card-num {
      font-size: .72rem; font-weight: 800; color: #fff;
      background: linear-gradient(135deg, #0d9488, #0284c7);
      border-radius: 6px;
      min-width: 28px; height: 22px;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0; margin-top: 1px;
    }
    .card-tag {
      font-size: .7rem; font-weight: 700;
      padding: 2px 9px; border-radius: 999px;
      flex-shrink: 0; margin-top: 1px;
    }
    .card-text {
      font-size: .9rem; font-weight: 600;
      color: var(--text); line-height: 1.55; flex: 1;
    }
    .card-prompt {
      font-size: .78rem; color: var(--sub);
      background: var(--bg); border-radius: 8px;
      padding: 8px 10px; line-height: 1.5;
    }
    .card-footer {
      display: flex; align-items: center; justify-content: flex-end;
    }
    .copy-hint {
      font-size: .72rem; color: #5eaaa0;
      display: flex; align-items: center; gap: 4px;
    }
    .copy-hint svg { width: 13px; height: 13px; }

    /* ===== TOAST ===== */
    .toast {
      position: fixed; bottom: 32px; left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: linear-gradient(135deg, #0d9488, #0284c7);
      color: #fff; font-size: .85rem; font-weight: 700;
      padding: 10px 24px; border-radius: 999px;
      box-shadow: 0 4px 20px rgba(13,148,136,.4);
      opacity: 0;
      transition: transform .3s ease, opacity .3s ease;
      pointer-events: none; z-index: 9999;
    }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    footer {
      text-align: center; padding: 24px;
      font-size: .78rem; color: #5eaaa0;
      border-top: 1px solid var(--border);
    }
    .card.hidden { display: none; }
  </style>
</head>
<body>

<header class="hero">
  <span class="emoji-deco">🏥💙</span>
  <div class="hero-badge">保健師 × CLAUDE</div>
  <h1>保健師のための<br>Claude活用アイデア100選</h1>
  <p class="hero-sub">記録作成・保健指導・地域連携・業務効率化…現場で奮闘する保健師がClaudeを使ってもっとスマートに・丁寧に・持続可能に働くためのプロンプトアイデア集です。</p>
  <div class="hero-count">
    <div class="hero-count-item">
      <div class="hero-count-num">100</div>
      <div class="hero-count-label">個のアイデア</div>
    </div>
    <div class="hero-count-item">
      <div class="hero-count-num">8</div>
      <div class="hero-count-label">カテゴリ</div>
    </div>
    <div class="hero-count-item">
      <div class="hero-count-num">∞</div>
      <div class="hero-count-label">活用の可能性</div>
    </div>
  </div>
</header>

<div class="controls">
  <div class="search-wrap">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
    <input class="search-input" type="text" id="searchInput" placeholder="キーワードで絞り込む（例：訪問、糖尿病、地区診断…）" />
  </div>
  <div class="filter-wrap" id="filterWrap"></div>
  <p class="result-count" id="resultCount"></p>
</div>

<main class="grid" id="grid"></main>
<div class="toast" id="toast">📋 コピーしました！</div>

<footer>
  <p>保健師のための Claude 活用アイデア 100選 ✦ カードをクリックするとプロンプトをコピーできます</p>
</footer>

<script>
const categories = [
  { id:"doc",    label:"📋 記録・文書作成",   color:"#0d9488", light:"#ccfbf1" },
  { id:"consult",label:"🏥 健康相談・指導",   color:"#0284c7", light:"#e0f2fe" },
  { id:"maternal",label:"👶 母子保健",        color:"#db2777", light:"#fce7f3" },
  { id:"elderly", label:"🧓 高齢者保健",      color:"#7c3aed", light:"#ede9fe" },
  { id:"edu",    label:"🏃 健康教育・啓発",   color:"#16a34a", light:"#dcfce7" },
  { id:"data",   label:"📊 データ・統計",     color:"#d97706", light:"#fef3c7" },
  { id:"collab", label:"🤝 地域連携・調整",   color:"#0891b2", light:"#cffafe" },
  { id:"work",   label:"💼 業務効率化",       color:"#4338ca", light:"#e0e7ff" },
];

const ideas = [
  // 📋 記録・文書作成 (1-13)
  { id:1,  cat:"doc", title:"家庭訪問記録を簡潔にまとめる", prompt:"以下の家庭訪問メモをSOAP形式（主観的情報・客観的情報・アセスメント・計画）に整理して、公式記録として使える文章にしてください。メモ：[ここに貼り付け]" },
  { id:2,  cat:"doc", title:"保健指導計画書のテンプレートを作成", prompt:"[対象者の状況：年齢・疾患・生活背景]を踏まえた保健指導計画書のテンプレートを作成してください。長期目標・短期目標・支援内容・評価時期を含む形式で。" },
  { id:3,  cat:"doc", title:"事業報告書の文章を整える", prompt:"以下の事業報告の下書きを、自治体の公式文書として適切な表現・構成に整えてください。数値データを効果的に示す文章にしてください。下書き：[ここに貼り付け]" },
  { id:4,  cat:"doc", title:"ケースカンファレンスの資料を作成", prompt:"[ケースの概要：年齢・主訴・家族背景・支援経過]をもとに、多職種カンファレンスで使う情報共有シートを作成してください。関係者が5分で概要を把握できる形式で。" },
  { id:5,  cat:"doc", title:"支援計画書の文章を書く", prompt:"[対象者情報・課題・支援目標]をもとに、自治体書式に合わせた支援計画書の本文を作成してください。具体的・測定可能な目標設定で。" },
  { id:6,  cat:"doc", title:"地区診断レポートをまとめる", prompt:"以下の地区データ（[人口動態・疾病状況・社会資源など]）をもとに、地区診断レポートの考察部分を作成してください。健康課題の優先度と根拠を明確にして。" },
  { id:7,  cat:"doc", title:"アセスメントシートのテンプレートを作成", prompt:"[対象：乳幼児/高齢者/精神障害者など]の初回アセスメントシートのテンプレートを作成してください。必要な情報収集項目・リスク評価・支援方針を網羅した形式で。" },
  { id:8,  cat:"doc", title:"業務引き継ぎ書を作成する", prompt:"[担当ケース名・支援経過・現在の課題・今後の支援方針]をもとに、次の担当者がスムーズに引き継げる引き継ぎ書を作成してください。" },
  { id:9,  cat:"doc", title:"健康診断結果の説明文を作成", prompt:"健康診断で[検査項目・数値]の結果が出た対象者（[年齢・性別・既往歴]）への説明文書を、わかりやすい言葉で作成してください。改善策も含めて。" },
  { id:10, cat:"doc", title:"月次報告書を効率よく仕上げる", prompt:"今月の業務実績（[訪問件数・相談件数・事業実施状況など]）をもとに、上司・議会向けの月次報告書を作成してください。課題と翌月の対応策も含めて。" },
  { id:11, cat:"doc", title:"関係機関への連絡文書を作成", prompt:"[医療機関名/機関種別]への[連絡内容・目的]を伝える公式文書を作成してください。情報提供の範囲と目的を明確にした形式で。" },
  { id:12, cat:"doc", title:"訪問記録の抜け漏れをチェック", prompt:"以下の訪問記録を確認し、公式記録として不足している情報・不明瞭な表現・追記すべき点を指摘してください。記録：[ここに貼り付け]" },
  { id:13, cat:"doc", title:"保健指導の評価記録をまとめる", prompt:"[期間]の保健指導（[指導内容・指導回数]）を行った対象者（[基本情報]）の評価記録を、目標達成度・変化・今後の方針を含めてまとめてください。" },

  // 🏥 健康相談・指導 (14-26)
  { id:14, cat:"consult", title:"高血圧の保健指導資料を作成", prompt:"[年齢・性別・血圧値・生活習慣]の対象者向けに、高血圧改善のための保健指導資料を作成してください。減塩・運動・服薬の3点を中心に、具体的で実践しやすい内容で。" },
  { id:15, cat:"consult", title:"糖尿病予防の生活指導内容を作成", prompt:"HbA1c [数値]・空腹時血糖 [数値]の[年齢]代[性別]への糖尿病予防指導の内容を作成してください。食事・運動・体重管理の具体的な目標設定と指導ポイントを。" },
  { id:16, cat:"consult", title:"禁煙指導のトーキングポイントを作る", prompt:"[喫煙歴・本数・禁煙意欲段階]の対象者への禁煙指導のポイントをまとめてください。動機付けから禁煙方法の選択肢、禁断症状への対処まで段階的に。" },
  { id:17, cat:"consult", title:"メンタルヘルス相談時の声かけ例文を作る", prompt:"初回相談で[主訴・状況]を話してくれた対象者への、信頼関係を築きながら状況を丁寧に把握するための声かけ例文を作ってください。傾聴を意識した表現で。" },
  { id:18, cat:"consult", title:"生活習慣病予防の指導内容を整理", prompt:"特定保健指導（[積極的支援/動機付け支援]）対象者（[年齢・腹囲・検査値]）への初回面接の指導内容と、行動目標設定のサポート方法を整理してください。" },
  { id:19, cat:"consult", title:"栄養指導の資料を作成する", prompt:"[年齢・性別・身長・体重・食生活の特徴]の対象者向けに、無理なく続けられる食生活改善の指導資料を作成してください。具体的な食品例・量・調理方法を含めて。" },
  { id:20, cat:"consult", title:"難病患者への支援計画を考える", prompt:"[疾患名・病期・家族構成・在宅での困りごと]の対象者への支援計画を作成してください。医療・福祉・日常生活支援の多面的な視点で、本人の意向を重視した計画で。" },
  { id:21, cat:"consult", title:"アルコール依存症の支援内容を整理", prompt:"[現在の状況・家族の状況・本人の意識]を踏まえ、アルコール依存症への保健師としての支援方針と、本人・家族それぞれへのアプローチ方法を整理してください。" },
  { id:22, cat:"consult", title:"認知症初期の相談対応方法をまとめる", prompt:"「最近物忘れが増えた」と相談に来た[年齢]の[本人/家族]への初回対応フローを作成してください。情報収集・受診勧奨・地域資源の案内を含む実践的な内容で。" },
  { id:23, cat:"consult", title:"虐待リスクアセスメントのポイントを整理", prompt:"[対象：児童/高齢者/障害者]の虐待リスクアセスメントで確認すべき観察ポイント・聴取項目・緊急度判断の基準を整理してください。チェックリスト形式で。" },
  { id:24, cat:"consult", title:"精神保健相談の対応マニュアルを作る", prompt:"住民から寄せられる精神保健に関する相談（[よくある相談内容：家族の様子がおかしい/本人が引きこもりなど]）への初期対応マニュアルを作成してください。" },
  { id:25, cat:"consult", title:"服薬管理の指導ポイントをまとめる", prompt:"[年齢・疾患・服薬数・生活状況]の対象者が服薬を継続できるよう、飲み忘れ防止・副作用の自己観察・医師への相談タイミングなどの指導ポイントをまとめてください。" },
  { id:26, cat:"consult", title:"運動指導プログラムを作成する", prompt:"[年齢・疾患・体力レベル・生活環境]の対象者向けに、安全に続けられる運動プログラムを作成してください。目標設定・種目・強度・頻度・注意点を含む形式で。" },

  // 👶 母子保健 (27-39)
  { id:27, cat:"maternal", title:"産後うつのスクリーニング活用法をまとめる", prompt:"EPDS（エジンバラ産後うつ病質問票）を活用した産後うつスクリーニングの実施方法・結果の解釈・ハイリスクケースへの対応フローを整理してください。" },
  { id:28, cat:"maternal", title:"育児支援家庭訪問のポイントを整理", prompt:"特定妊婦・養育支援が必要な家庭への訪問前チェックリストと、訪問時の観察ポイント・情報収集項目・支援方針の判断基準を整理してください。" },
  { id:29, cat:"maternal", title:"新生児訪問の記録テンプレートを作成", prompt:"新生児訪問（生後28日以内）で使用する訪問記録テンプレートを作成してください。母子の健康状態・授乳状況・養育環境・保護者の状態・フォローアップ計画を含む形式で。" },
  { id:30, cat:"maternal", title:"妊産婦への保健指導内容を整理する", prompt:"[妊娠週数・初産/経産・気になること]の妊婦への保健指導内容を整理してください。栄養・運動・心のケア・産後の準備・地域資源の案内を含む包括的な内容で。" },
  { id:31, cat:"maternal", title:"乳幼児健診の問診票の見方を整理する", prompt:"[月齢・健診の種類]の乳幼児健診で、問診票の回答から読み取るべきリスクサインと、気になる回答があった場合の対応方針を整理してください。" },

  { id:90,  cat:"work", title:"新人保健師の育成計画を作成する", prompt:"[新人の経験・配属部署]の新任保健師の1年間のOJT育成計画を作成してください。月別の習得目標・担当業務の段階的な引き渡し・メンターとのフォロー体制を含む形式で。" },
  { id:91,  cat:"work", title:"保健師のバーンアウト予防対策を考える", prompt:"支援職特有のバーンアウト（燃え尽き症候群）の早期サインと、個人・チーム・組織それぞれの予防対策を整理してください。保健師自身のセルフケア方法も含めて。" },
  { id:92,  cat:"work", title:"困難ケースの対応を一緒に考える", prompt:"[ケースの概要：支援を拒否している/複合的な問題を抱えている/暴言がある等]の困難ケースについて、今後の支援方針と具体的なアプローチ方法を一緒に考えてください。" },
  { id:93,  cat:"work", title:"委託業務の仕様書を作成する", prompt:"[委託事業名・目的・対象・業務内容]の委託仕様書を作成してください。業務の範囲・実施方法・報告義務・個人情報の取扱い・評価基準を含む行政文書形式で。" },
  { id:94,  cat:"work", title:"ICTを活用した業務改善を考える", prompt:"保健師業務（訪問記録/相談対応/健康教育/地域連携）の中で、ICTツールを活用して効率化・質向上できる部分を特定し、導入方法と注意点を提案してください。" },
  { id:95,  cat:"work", title:"保健師の研修計画を立てる", prompt:"[チームの人数・年齢層・スキル課題]の保健師チームの年間研修計画を立ててください。内部研修・外部研修・OJTを組み合わせた、実践に直結する学びの場を設計してください。" },
  { id:96,  cat:"work", title:"ヒヤリハット事例を整理・共有する", prompt:"[事案の概要]のヒヤリハット事例を、原因分析・再発防止策・チームへの共有方法の観点から整理してください。責任追及でなく学習と改善につながる形式で。" },
  { id:97,  cat:"work", title:"保健師としてのキャリアパスを考える", prompt:"[経験年数・現在のポジション・強み・関心領域]の保健師のキャリアパスを一緒に考えてください。専門性の深化・管理職・他機関連携など、様々なキャリアの可能性と準備すべきことを。" },
  { id:98,  cat:"work", title:"上司への業務改善提案書を作成する", prompt:"[改善したい業務・問題点・提案内容]について、上司に承認してもらうための業務改善提案書を作成してください。現状の課題・改善案・期待される効果・必要なリソースを含む形式で。" },
  { id:99,  cat:"work", title:"チームミーティングのアジェンダを作成", prompt:"週次・月次の保健師チームミーティングのアジェンダテンプレートを作成してください。情報共有・困難ケース相談・業務報告・研修予定を効率よく行える30〜60分構成で。" },
  { id:100, cat:"work", title:"保健師の仕事の魅力を言語化する", prompt:"「保健師という仕事の魅力・やりがい・社会的意義」を、就職説明会・学生への講義・採用面接で話すための、心に響く言葉で語れる文章を一緒に作ってください。" },
];

// CATEGORY MAP
const catMap = {};
categories.forEach(c => { catMap[c.id] = c; });

// RENDER FILTERS
const filterWrap = document.getElementById('filterWrap');
const allBtn = document.createElement('button');
allBtn.className = 'filter-btn active';
allBtn.textContent = '✨ すべて';
allBtn.dataset.cat = 'all';
filterWrap.appendChild(allBtn);
categories.forEach(c => {
  const btn = document.createElement('button');
  btn.className = 'filter-btn';
  btn.textContent = c.label;
  btn.dataset.cat = c.id;
  filterWrap.appendChild(btn);
});

// RENDER CARDS
const grid = document.getElementById('grid');
ideas.forEach(idea => {
  const cat = catMap[idea.cat];
  const card = document.createElement('div');
  card.className = 'card';
  card.dataset.cat = idea.cat;
  card.dataset.text = (idea.title + ' ' + idea.prompt).toLowerCase();

  card.innerHTML = `
    <style>.card[data-cat="${idea.cat}"]::before { background: ${cat.color}; }</style>
    <div class="card-header">
      <span class="card-num">${idea.id}</span>
      <span class="card-tag" style="background:${cat.light};color:${cat.color};">${cat.label}</span>
    </div>
    <div class="card-text">${idea.title}</div>
    <div class="card-prompt">${idea.prompt}</div>
    <div class="card-footer">
      <span class="copy-hint">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
        クリックしてコピー
      </span>
    </div>
  `;
  card.addEventListener('click', () => {
    navigator.clipboard.writeText(idea.prompt).then(() => {
      showToast();
      card.classList.add('copied');
      setTimeout(() => card.classList.remove('copied'), 400);
    });
  });
  grid.appendChild(card);
});

// FILTER LOGIC
let currentCat = 'all', currentQuery = '';
function applyFilter() {
  const cards = document.querySelectorAll('.card');
  let count = 0;
  cards.forEach(card => {
    const catMatch = currentCat === 'all' || card.dataset.cat === currentCat;
    const textMatch = !currentQuery || card.dataset.text.includes(currentQuery);
    if (catMatch && textMatch) { card.classList.remove('hidden'); count++; }
    else card.classList.add('hidden');
  });
  document.getElementById('resultCount').textContent =
    currentCat === 'all' && !currentQuery
      ? `全 ${count} 個のアイデア`
      : `${count} 個のアイデアが見つかりました`;
}
filterWrap.addEventListener('click', e => {
  if (!e.target.classList.contains('filter-btn')) return;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  e.target.classList.add('active');
  currentCat = e.target.dataset.cat;
  applyFilter();
});
document.getElementById('searchInput').addEventListener('input', e => {
  currentQuery = e.target.value.trim().toLowerCase();
  applyFilter();
});

// TOAST
const toast = document.getElementById('toast');
let toastTimer;
function showToast() {
  clearTimeout(toastTimer);
  toast.classList.add('show');
  toastTimer = setTimeout(() => toast.classList.remove('show'), 2000);
}
applyFilter();
</script>
</body>
</html>
